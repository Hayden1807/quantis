services:
  postgres:
    image: postgres:16
    container_name: consumption-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consumption
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consumption"]
      interval: 3s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: quantis_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 20

  mailpit:
    image: axllent/mailpit:latest
    container_name: consumption-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"
  api:
    image: rust:latest
    container_name: quantis_api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/consumption
      REDIS_URL: redis://redis:6379
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info
      JWT_SECRET: dev-secret-change-me
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      SMTP_INSECURE: "true"
      SMTP_FROM_EMAIL: noreply@quantis.local
      SMTP_FROM_NAME: Quantis
      PASSWORD_RESET_URL_BASE: http://localhost:8000/reset-password.html
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target
    command: ["cargo", "run"]

  web:
    image: nginx:alpine
    container_name: quantis_web
    ports:
      - "8000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  redisdata:
  cargo-registry:
  cargo-git:
  target:
