version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: quantis_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consumption
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consumption"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    image: rust:latest
    container_name: quantis_api
    working_dir: /app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/consumption
      BIND_ADDR: 0.0.0.0:8080
      RUST_LOG: info
    expose:
      - "8080"
    volumes:
      - ./:/app
      - cargo-registry:/usr/local/cargo/registry
      - cargo-git:/usr/local/cargo/git
      - target:/app/target
    command: ["cargo", "run"]

  web:
    image: nginx:alpine
    container_name: quantis_web
    ports:
      - "8000:80"
    volumes:
      - ./web:/usr/share/nginx/html:ro
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

volumes:
  pgdata:
  cargo-registry:
  cargo-git:
  target:

