services:
  postgres:
    image: postgres:16
    container_name: consumption-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: consumption
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d consumption"]
      interval: 3s
      timeout: 3s
      retries: 20

  api:
    build: .
    container_name: consumption-api
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/consumption
      BIND_ADDR: 0.0.0.0:8080
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
