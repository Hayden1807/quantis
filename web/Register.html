<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quantis - Inscription</title>
  <link rel="stylesheet" href="../css/shared/base.css" />
  <link rel="stylesheet" href="../css/shared/ui.css" />
  <link rel="stylesheet" href="../css/log.css" />
</head>
<body>

<main class="login">
  <a class="login__close" href="../index.php" aria-label="Retour a l'accueil">x</a>

  <section class="login__panel">
    <div class="login__brand">
      <img src="../assets/images/QuantisLogo.png" alt="Logo Quantis" />
      <span>Quantis</span>
    </div>

    <header class="login__head">
      <h1>Inscription</h1>
      <p>Creez votre compte Quantis en quelques etapes.</p>
    </header>

    <form class="login__form" id="registerForm" novalidate>
      <label class="field">
        <span>Nom d'utilisateur</span>
        <input id="username" type="text" name="username" placeholder="ex: utilisateur1234" />
      </label>

      <label class="field">
        <span>Email</span>
        <input id="email" type="email" name="email" placeholder="ex: prenom.nom@email.com" required />
      </label>

      <label class="field">
        <span>Mot de passe</span>
        <input id="password" type="password" name="password" placeholder="minimum 6 caracteres" minlength="6" required />
      </label>

      <label class="field">
        <span>Verifier le mot de passe</span>
        <input id="confirm_password" type="password" name="confirm_password" placeholder="confirmer le mot de passe" minlength="6" required />
      </label>

      <label class="check">
        <input id="terms" type="checkbox" name="terms" required />
        <span>Accepter les conditions et termes</span>
      </label>

      <button class="btn btn--primary" id="btn" type="submit">Creer le compte</button>

      <div class="login__divider">
        <span>ou</span>
      </div>

      <a class="btn btn--ghost" href="./Login.php">J'ai deja un compte</a>

      <pre id="out" class="login__output" aria-live="polite"></pre>
    </form>
  </section>
</main>

<script>
  const API_SIGNUP_URL = "/api/signup";

  const form = document.getElementById("registerForm");
  const btn = document.getElementById("btn");
  const out = document.getElementById("out");
  const email = document.getElementById("email");
  const password = document.getElementById("password");
  const confirmPassword = document.getElementById("confirm_password");
  const terms = document.getElementById("terms");

  function setOutput(message) {
    out.textContent = message;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();

    if (!email.value || !password.value) {
      setOutput("Veuillez remplir l'email et le mot de passe.");
      return;
    }

    if (password.value.length < 6) {
      setOutput("Le mot de passe doit contenir au moins 6 caracteres.");
      return;
    }

    if (password.value !== confirmPassword.value) {
      setOutput("Les mots de passe ne correspondent pas.");
      return;
    }

    if (!terms.checked) {
      setOutput("Vous devez accepter les conditions et termes.");
      return;
    }

    btn.disabled = true;
    setOutput("loading...");

    try {
      const res = await fetch(API_SIGNUP_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          email: email.value,
          password: password.value
        })
      });

      const raw = await res.text();
      let parsed = null;

      try {
        parsed = JSON.parse(raw);
      } catch (_) {
        parsed = null;
      }

      if (parsed && typeof parsed === "object") {
        const token = parsed.token || parsed.access_token || parsed.jwt;
        if (token) {
          localStorage.setItem("token", token);
        }
      }

      setOutput(`HTTP ${res.status}\n${raw}`);
    } catch (error) {
      setOutput(`Network error\n${error?.message || error}`);
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
