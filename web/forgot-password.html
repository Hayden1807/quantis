<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quantis - Mot de passe oublié</title>
  <link rel="stylesheet" href="../css/shared/base.css" />
  <link rel="stylesheet" href="../css/shared/ui.css" />
  <link rel="stylesheet" href="../css/log.css" />
</head>
<body>
<main class="login">
  <a class="login__close" href="./login.html" aria-label="Retour a la connexion">x</a>

  <section class="login__panel">
    <div class="login__brand">
      <img src="../assets/images/QuantisLogo.png" alt="Logo Quantis" />
      <span>Quantis</span>
    </div>

    <header class="login__head">
      <h1>Mot de passe oublié</h1>
      <p>Entrez votre email. Si un compte existe, un lien de réinitialisation sera envoyé.</p>
    </header>

    <p class="error" id="errorBox" hidden></p>
    <p class="muted" id="successBox" hidden></p>

    <form class="login__form" id="forgotForm">
      <label class="field">
        <span>Email</span>
        <input id="email" type="email" name="email" placeholder="ex: prenom.nom@email.com" required />
      </label>

      <button class="btn btn--primary" id="btn" type="submit">Envoyer le lien</button>
      <a class="btn btn--ghost" href="./login.html">Retour à la connexion</a>

      <pre id="out" style="white-space: pre-wrap; margin-top: 1rem;"></pre>
    </form>
  </section>
</main>

<script>
  const API_URL = "/api/forgot-password";
  const form = document.getElementById("forgotForm");
  const emailInput = document.getElementById("email");
  const button = document.getElementById("btn");
  const out = document.getElementById("out");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");

  function showError(message) {
    errorBox.textContent = message;
    errorBox.hidden = false;
    successBox.hidden = true;
  }

  function showSuccess(message) {
    successBox.textContent = message;
    successBox.hidden = false;
    errorBox.hidden = true;
  }

  function clearBoxes() {
    errorBox.hidden = true;
    successBox.hidden = true;
    errorBox.textContent = "";
    successBox.textContent = "";
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearBoxes();
    out.textContent = "loading...";
    button.disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ email: emailInput.value }),
      });

      const raw = await res.text();
      out.textContent = `HTTP ${res.status}\n${raw}`;

      let data = null;
      try { data = JSON.parse(raw); } catch (_) {}

      if (res.ok) {
        showSuccess(
          data?.message || "Si un compte existe pour cet email, un lien de réinitialisation a été envoyé."
        );
        form.reset();
        return;
      }

      showError(data?.error || data?.message || "Impossible d'envoyer le lien.");
    } catch (error) {
      out.textContent = "Network error";
      showError("Erreur reseau: impossible de joindre l'API.");
      console.error(error);
    } finally {
      button.disabled = false;
    }
  });
</script>
</body>
</html>
