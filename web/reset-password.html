<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Quantis - Réinitialiser le mot de passe</title>
  <link rel="stylesheet" href="../css/shared/base.css" />
  <link rel="stylesheet" href="../css/shared/ui.css" />
  <link rel="stylesheet" href="../css/log.css" />
</head>
<body>
<main class="login">
  <a class="login__close" href="./login.html" aria-label="Retour a la connexion">x</a>

  <section class="login__panel">
    <div class="login__brand">
      <img src="../assets/images/QuantisLogo.png" alt="Logo Quantis" />
      <span>Quantis</span>
    </div>

    <header class="login__head">
      <h1>Réinitialiser le mot de passe</h1>
      <p>Choisissez un nouveau mot de passe pour votre compte.</p>
    </header>

    <p class="error" id="errorBox" hidden></p>
    <p class="muted" id="successBox" hidden></p>

    <form class="login__form" id="resetForm">
      <label class="field">
        <span>Nouveau mot de passe</span>
        <input id="password" type="password" name="password" minlength="10" placeholder="minimum 10 caracteres" required />
      </label>

      <label class="field">
        <span>Confirmer le mot de passe</span>
        <input id="passwordConfirm" type="password" name="passwordConfirm" minlength="10" placeholder="confirmer le mot de passe" required />
      </label>

      <button class="btn btn--primary" id="btn" type="submit">Mettre à jour</button>
      <a class="btn btn--ghost" href="./login.html">Retour à la connexion</a>

      <pre id="out" style="white-space: pre-wrap; margin-top: 1rem;"></pre>
    </form>
  </section>
</main>

<script>
  const API_URL = "/api/reset-password";
  const form = document.getElementById("resetForm");
  const passwordInput = document.getElementById("password");
  const passwordConfirmInput = document.getElementById("passwordConfirm");
  const button = document.getElementById("btn");
  const out = document.getElementById("out");
  const errorBox = document.getElementById("errorBox");
  const successBox = document.getElementById("successBox");
  const token = new URLSearchParams(window.location.search).get("token") || "";

  function showError(message) {
    errorBox.textContent = message;
    errorBox.hidden = false;
    successBox.hidden = true;
  }

  function showSuccess(message) {
    successBox.textContent = message;
    successBox.hidden = false;
    errorBox.hidden = true;
  }

  function clearBoxes() {
    errorBox.hidden = true;
    successBox.hidden = true;
    errorBox.textContent = "";
    successBox.textContent = "";
  }

  if (!token) {
    showError("Lien invalide: token manquant.");
    button.disabled = true;
  }

  form.addEventListener("submit", async (event) => {
    event.preventDefault();
    clearBoxes();

    if (!token) {
      showError("Lien invalide: token manquant.");
      return;
    }

    if (passwordInput.value !== passwordConfirmInput.value) {
      showError("Les mots de passe ne correspondent pas.");
      return;
    }

    out.textContent = "loading...";
    button.disabled = true;

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          token,
          new_password: passwordInput.value,
        }),
      });

      const raw = await res.text();
      out.textContent = `HTTP ${res.status}\n${raw}`;

      let data = null;
      try { data = JSON.parse(raw); } catch (_) {}

      if (res.ok) {
        showSuccess(data?.message || "Mot de passe réinitialisé avec succès.");
        form.reset();
        setTimeout(() => {
          window.location.href = "./login.html";
        }, 1200);
        return;
      }

      showError(data?.error || data?.message || "Impossible de réinitialiser le mot de passe.");
    } catch (error) {
      out.textContent = "Network error";
      showError("Erreur reseau: impossible de joindre l'API.");
      console.error(error);
    } finally {
      button.disabled = false;
    }
  });
</script>
</body>
</html>
